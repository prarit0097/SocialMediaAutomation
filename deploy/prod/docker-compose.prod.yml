name: postzyo

services:
  web:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: gunicorn social_automation.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 120
    env_file:
      - ../../.env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: celery -A social_automation worker -l info --pool=threads -c 8 -n worker_main@%h
    env_file:
      - ../../.env
    volumes:
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    restart: unless-stopped

  beat:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: celery -A social_automation beat -l info
    env_file:
      - ../../.env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-social_automation}
      POSTGRES_USER: ${POSTGRES_USER:-social_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    command: redis-server --appendonly yes --save 60 1000
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27
    ports:
      - "127.0.0.1:${APP_INTERNAL_PORT:-18010}:80"
    volumes:
      - ../../deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
