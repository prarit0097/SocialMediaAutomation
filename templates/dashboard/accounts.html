{% extends 'base.html' %}
{% block content %}
<section class="card hero-card">
  <p class="eyebrow">Accounts</p>
  <h1>Connected Accounts</h1>
  <p class="hero-copy">Link your Meta assets once and manage publishing from this control center.</p>
</section>

<section class="card">
  <div class="section-actions">
    <button id="connectMetaBtn" class="btn">Connect Facebook + Instagram</button>
    <button id="refreshAccountsBtn" class="btn muted">Refresh List</button>
  </div>
  <p id="accountSyncStatus" class="meta-note"></p>
  <div id="accountsTable" class="table-wrap"></div>
</section>

<section class="card">
  <div class="section-head">
    <h2>Meta Page Catalog</h2>
    <button id="checkConnectabilityBtn" class="btn muted">Check Connectability</button>
  </div>
  <p id="metaCatalogStatus" class="meta-note"></p>
  <div id="metaCatalogTable" class="table-wrap"></div>
</section>
{% endblock %}
