{% extends 'base.html' %}
{% block content %}
<section class="card hero-card">
  <p class="eyebrow">Analytics</p>
  <h1>Insights</h1>
  <p class="hero-copy">Review follower trends and latest page content performance in one place.</p>
</section>

<section class="card">
  <div class="inline-controls">
    <input type="number" id="insightAccountId" placeholder="Enter Account ID">
    <button id="fetchInsightsBtn" class="btn">Fetch Cached/Latest</button>
    <button id="refreshInsightsBtn" class="btn muted">Force Refresh</button>
  </div>

  <div id="insightError" class="error-text"></div>
  <div id="insightWarning" class="warning-text"></div>
  <div id="publicUrlStatus" class="meta-note"></div>

  <div class="page-name-hero" id="insightPageHero" hidden>
    <p class="page-name-label">Selected Page</p>
    <h2 class="page-name-title" id="insightPageName">-</h2>
  </div>

  <div class="insight-summary-grid" id="insightSummaryGrid">
    <article class="insight-stat-card">
      <h3>Total Followers</h3>
      <p id="totalFollowers">-</p>
    </article>
    <article class="insight-stat-card">
      <h3>Total Following</h3>
      <p id="totalFollowing">-</p>
    </article>
    <article class="insight-stat-card">
      <h3>Total Post Share</h3>
      <p id="totalPostShare">-</p>
    </article>
  </div>

  <p class="meta-note" id="insightMeta"></p>

  <section class="card nested-card">
    <h2>Published Posts</h2>
    <div class="table-wrap" id="insightPostsTable"></div>
  </section>

  <section class="card nested-card">
    <h2>Raw Metrics</h2>
    <div class="table-wrap" id="insightMetricsTable"></div>
  </section>
</section>
{% endblock %}
