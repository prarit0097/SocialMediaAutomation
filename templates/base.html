{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Automation</title>
    <link rel="stylesheet" href="{% static 'dashboard/styles.css' %}">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Social Automation</div>
      {% if request.user.is_authenticated %}
      <nav>
        <a href="{% url 'dashboard:accounts' %}">Accounts</a>
        <a href="{% url 'dashboard:scheduler' %}">Scheduler</a>
        <a href="{% url 'dashboard:insights' %}">Insights</a>
        <a href="{% url 'logout' %}">Logout</a>
      </nav>
      {% endif %}
    </header>
    <main class="layout">
      {% block content %}{% endblock %}
    </main>
    <script src="{% static 'dashboard/app.js' %}"></script>
  </body>
</html>
